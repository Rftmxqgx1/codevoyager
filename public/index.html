<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <link rel="icon" href="%PUBLIC_URL%/favicon.ico" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#000000" />
    <meta name="description" content="CodeVoyager Application - Dark Mode & Hardened Login" />
    <link rel="apple-touch-icon" href="%PUBLIC_URL%/logo192.png" />
    <link rel="manifest" href="%PUBLIC_URL%/manifest.json" />
    <title>CodeVoyager</title>
    <style>
      /* Tailwind-like utility classes for basic styling */
      * {
        box-sizing: border-box;
      }
      body {
        margin: 0;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', 'Oxygen',
          'Ubuntu', 'Cantarell', 'Fira Sans', 'Droid Sans', 'Helvetica Neue',
          sans-serif;
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
      }
      .space-y-4 > * + * {
        margin-top: 1rem;
      }
      .p-2 { padding: 0.5rem; }
      .p-4 { padding: 1rem; }
      .p-6 { padding: 1.5rem; }
      .p-8 { padding: 2rem; }
      .m-4 { margin: 1rem; }
      .mt-4 { margin-top: 1rem; }
      .mb-1 { margin-bottom: 0.25rem; }
      .mb-4 { margin-bottom: 1rem; }
      .mx-auto { margin-left: auto; margin-right: auto; }
      .max-w-md { max-width: 28rem; }
      .w-full { width: 100%; }
      .block { display: block; }
      .text-sm { font-size: 0.875rem; }
      .text-xl { font-size: 1.25rem; }
      .text-2xl { font-size: 1.5rem; }
      .font-medium { font-weight: 500; }
      .font-semibold { font-weight: 600; }
      .font-bold { font-weight: 700; }
      .text-center { text-align: center; }
      .text-white { color: white; }
      .text-gray-800 { color: #1f2937; }
      .text-gray-900 { color: #111827; }
      .text-secondaryLabel { color: #6b7280; }
      .text-red-600 { color: #dc2626; }
      .bg-gray-50 { background-color: #f9fafb; }
      .bg-gray-900 { background-color: #111827; }
      .bg-gray-800 { background-color: #1f2937; }
      .bg-gray-200 { background-color: #e5e7eb; }
      .bg-white { background-color: white; }
      .bg-blue-600 { background-color: #2563eb; }
      .bg-blue-700 { background-color: #1d4ed8; }
      .bg-red-600 { background-color: #dc2626; }
      .bg-red-700 { background-color: #b91c1c; }
      .bg-systemBlue { background-color: #007aff; }
      .rounded-lg { border-radius: 0.5rem; }
      .shadow-lg { box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1); }
      .border { border: 1px solid #d1d5db; }
      .transition-colors { transition-property: color, background-color, border-color; }
      .duration-200 { transition-duration: 200ms; }
      .duration-300 { transition-duration: 300ms; }
      .hover\:bg-blue-700:hover { background-color: #1d4ed8; }
      .hover\:bg-red-700:hover { background-color: #b91c1c; }
      .disabled\:opacity-50:disabled { opacity: 0.5; }
      .min-h-screen { min-height: 100vh; }
      .container { width: 100%; max-width: 1200px; margin-left: auto; margin-right: auto; }
      .flex { display: flex; }
      .justify-between { justify-content: space-between; }
      .items-center { align-items: center; }
      .focus\:ring-2:focus { box-shadow: 0 0 0 2px rgba(37, 99, 235, 0.5); }
      .focus\:ring-blue-500:focus { box-shadow: 0 0 0 2px rgba(59, 130, 246, 0.5); }
    </style>
  </head>
  <body>
    <noscript>You need to enable JavaScript to run this app.</noscript>
    <div id="root"></div>
  </body>
</html>
