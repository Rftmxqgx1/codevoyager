version: '3.8'

services:
  # Main Application Container
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: codevoyager-main
    ports:
      - "3000:80"
    volumes:
      - app-backup:/backup
      - ./src:/app/src:ro
      - ./governance:/app/governance:ro
      - ./logs:/app/logs:ro
      - ./strategy:/app/strategy:ro
    environment:
      - NODE_ENV=production
      - REACT_APP_ENV=production
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:80/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - codevoyager-net

  # Backup Sub-container
  backup:
    image: alpine:latest
    container_name: codevoyager-backup
    volumes:
      - app-backup:/backup
      - .:/source:ro
    command: |
      sh -c '
        apk add --no-cache tar gzip
        echo "Backup service ready"
        while true; do
          TIMESTAMP=$(date +%Y%m%d-%H%M%S)
          echo "Creating backup at $$TIMESTAMP..."
          cd /source
          tar -czf /backup/codevoyager-backup-$$TIMESTAMP.tar.gz \
            --exclude=node_modules \
            --exclude=.git \
            --exclude=backup \
            --exclude=app-backup \
            . 2>/dev/null && echo "Backup completed: /backup/codevoyager-backup-$$TIMESTAMP.tar.gz"
          sleep 3600
        done
      '
    restart: unless-stopped
    depends_on:
      - app
    networks:
      - codevoyager-net

  # Health Monitor Sub-container
  monitor:
    image: alpine:latest
    container_name: codevoyager-health
    command: |
      sh -c '
        apk add --no-cache curl
        echo "Health monitor started"
        while true; do
          if curl -f http://app:80/health > /dev/null 2>&1; then
            echo "$(date): App is healthy"
          else
            echo "$(date): WARNING - App health check failed"
          fi
          sleep 60
        done
      '
    restart: unless-stopped
    depends_on:
      - app
    networks:
      - codevoyager-net

volumes:
  app-backup:
    driver: local

networks:
  codevoyager-net:
    driver: bridge
